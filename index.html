<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>POC Propiedades</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans', sans-serif; margin:0; }
.gallery-main { height:400px; position:relative; }
.gallery-main img { width:100%; height:100%; object-fit:cover; display:none; }
.gallery-main img.active { display:block; }

.gallery-thumbs { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.gallery-thumbs img { width:100%; height:80px; object-fit:cover; cursor:pointer; opacity:0.6; }
.gallery-thumbs img.active { opacity:1; outline:2px solid gold; }

.gallery-arrow {
 position:absolute; top:50%; transform:translateY(-50%);
 background:black; color:white; border:none;
 width:40px; height:40px; cursor:pointer;
}
.prev { left:10px; }
.next { right:10px; }

.gallery-counter {
 position:absolute; bottom:10px; right:10px;
 background:black; color:white; padding:4px 10px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">Casa en Maipú</h2>

<div style="max-width:900px;margin:auto;">

<!-- GALERÍA PRINCIPAL -->
<div class="gallery-main" id="galleryMain">

<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_0_obqlby.jpg" class="active">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_1_bzq32t.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_2_uwjbg6.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_3_fosqyc.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_4_znjci3.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_5_untacf.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_6_y7nqhs.jpg">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_1200/Casa_maipu_7_f0acry.jpg">

<button class="gallery-arrow prev" onclick="changePhoto(-1)">‹</button>
<button class="gallery-arrow next" onclick="changePhoto(1)">›</button>

<span class="gallery-counter" id="counter">1 / 8</span>
</div>

<!-- THUMBNAILS -->
<div class="gallery-thumbs" id="thumbs">

<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_0_obqlby.jpg" class="active" onclick="goTo(0)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_1_bzq32t.jpg" onclick="goTo(1)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_2_uwjbg6.jpg" onclick="goTo(2)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_3_fosqyc.jpg" onclick="goTo(3)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_4_znjci3.jpg" onclick="goTo(4)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_5_untacf.jpg" onclick="goTo(5)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_6_y7nqhs.jpg" onclick="goTo(6)">
<img src="https://res.cloudinary.com/dsgkuij5a/image/upload/f_auto,q_auto,w_200/Casa_maipu_7_f0acry.jpg" onclick="goTo(7)">

</div>

</div>

<script>
let current = 0;
const images = document.querySelectorAll('#galleryMain img');
const thumbs = document.querySelectorAll('#thumbs img');
const counter = document.getElementById('counter');

function update() {
 images.forEach(img => img.classList.remove('active'));
 thumbs.forEach(t => t.classList.remove('active'));

 images[current].classList.add('active');
 thumbs[current].classList.add('active');

 counter.textContent = (current + 1) + " / " + images.length;
}

function changePhoto(dir) {
 current = (current + dir + images.length) % images.length;
 update();
}

function goTo(n) {
 current = n;
 update();
}
</script>

</body>
</html>
